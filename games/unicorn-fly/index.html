<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Unicorn Sky Rush</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{overflow:hidden;font-family:'Segoe UI',sans-serif;touch-action:none;user-select:none;background:#87c8f5;}
canvas{display:block;}
#ui{position:fixed;top:0;left:0;width:100%;pointer-events:none;}
#score-bar{display:flex;justify-content:space-between;align-items:center;padding:18px 24px;}
#score{color:#fff;font-size:24px;font-weight:800;text-shadow:0 2px 12px rgba(0,0,0,0.55);}
#best{color:rgba(255,255,255,0.75);font-size:14px;text-shadow:0 1px 6px rgba(0,0,0,0.4);}
#hearts{display:flex;gap:6px;}
.heart{font-size:24px;transition:all 0.3s;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.3));}
.heart.lost{opacity:0.2;transform:scale(0.75);}
#drag-hint{position:fixed;bottom:32px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.55);font-size:14px;pointer-events:none;transition:opacity 0.8s;text-shadow:0 1px 8px rgba(0,0,0,0.4);white-space:nowrap;}
#flash{position:fixed;inset:0;background:radial-gradient(circle,rgba(255,50,70,0.55),transparent 70%);opacity:0;pointer-events:none;transition:opacity 0.15s;}
#sl{position:fixed;inset:0;pointer-events:none;}

/* ── CHARACTER SELECT ── */
#charselect{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;overflow-y:auto;padding:24px 16px 40px;background:linear-gradient(160deg,#1a0535 0%,#0d1f4a 60%,#0a2a1a 100%);}
#charselect h1{color:#fff;font-size:clamp(26px,6vw,46px);font-weight:900;letter-spacing:-0.5px;margin-bottom:4px;text-shadow:0 0 40px rgba(200,140,255,0.8);}
#charselect .tagline{color:rgba(255,255,255,0.5);font-size:14px;margin-bottom:28px;}

.cs-section{width:100%;max-width:700px;margin-bottom:24px;}
.cs-section h2{color:rgba(255,255,255,0.85);font-size:15px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;margin-bottom:12px;padding-left:2px;}

/* Card grid */
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;}
.card{background:rgba(255,255,255,0.07);border:2px solid rgba(255,255,255,0.12);border-radius:16px;padding:12px 8px 10px;cursor:pointer;transition:transform 0.15s,border-color 0.15s,background 0.15s;display:flex;flex-direction:column;align-items:center;gap:8px;}
.card:hover{transform:scale(1.04);border-color:rgba(255,255,255,0.35);}
.card.selected{border-color:#c084fc;background:rgba(192,132,252,0.18);transform:scale(1.06);}
.card svg{width:80px;height:80px;display:block;}
.card-label{color:#fff;font-size:12px;font-weight:600;text-align:center;opacity:0.85;}
.card.selected .card-label{color:#d8b4fe;}

/* Colour row for unicorn combos */
.colour-row{display:flex;gap:8px;flex-wrap:wrap;}
.colour-swatch{width:44px;height:44px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:transform 0.15s,border-color 0.15s;flex-shrink:0;}
.colour-swatch:hover{transform:scale(1.12);}
.colour-swatch.selected{border-color:#fff;transform:scale(1.18);}

.cs-row{display:flex;align-items:center;gap:14px;margin-bottom:14px;}
.cs-row span{color:rgba(255,255,255,0.7);font-size:13px;min-width:60px;}

#fly-btn{background:linear-gradient(135deg,#c084fc,#ec4899,#f97316);color:#fff;border:none;border-radius:100px;font-size:20px;font-weight:900;padding:18px 64px;cursor:pointer;margin-top:8px;min-height:64px;transition:transform 0.15s,box-shadow 0.15s;box-shadow:0 8px 32px rgba(192,132,252,0.5);}
#fly-btn:hover{transform:scale(1.05);}
#fly-btn:active{transform:scale(0.96);}

/* ── GAME OVER ── */
#gameover{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;background:rgba(5,5,25,0.82);backdrop-filter:blur(8px);pointer-events:all;}
#gameover h1{color:#fff;font-size:clamp(28px,6vw,50px);font-weight:900;margin-bottom:8px;text-shadow:0 0 40px rgba(200,140,255,0.7);}
#gameover .subtitle{color:rgba(255,255,255,0.6);font-size:15px;margin-bottom:28px;text-align:center;padding:0 32px;}
.go-btn{background:linear-gradient(135deg,#c084fc,#ec4899);color:#fff;border:none;border-radius:100px;font-size:17px;font-weight:800;padding:15px 44px;cursor:pointer;margin:6px;min-height:56px;box-shadow:0 6px 24px rgba(192,132,252,0.4);}
</style>
</head>
<body>
<canvas id="c"></canvas>
<canvas id="sl"></canvas>
<div id="flash"></div>

<!-- HUD (hidden until game starts) -->
<div id="ui" style="display:none;">
  <div id="score-bar">
    <div id="score">0m</div>
    <div id="hearts">
      <span class="heart" id="h1">❤️</span>
      <span class="heart" id="h2">❤️</span>
      <span class="heart" id="h3">❤️</span>
    </div>
    <div id="best">Best: 0m</div>
  </div>
</div>
<div id="drag-hint" style="opacity:0;">✦ arrow keys or drag to steer ✦</div>

<!-- CHARACTER SELECT -->
<div id="charselect">
  <h1>🦄 Sky Rush</h1>
  <p class="tagline">Choose your unicorn &amp; fairy before you fly</p>

  <!-- FAIRY DRESS -->
  <div class="cs-section">
    <h2>✨ Fairy Princess</h2>
    <div class="card-grid" id="fairy-grid"></div>
  </div>

  <!-- UNICORN BODY -->
  <div class="cs-section">
    <h2>🦄 Unicorn Colours</h2>
    <div class="cs-row"><span>Body</span>   <div class="colour-row" id="sw-body"></div></div>
    <div class="cs-row"><span>Mane</span>   <div class="colour-row" id="sw-mane"></div></div>
    <div class="cs-row"><span>Horn</span>   <div class="colour-row" id="sw-horn"></div></div>
    <div class="cs-row"><span>Hooves</span> <div class="colour-row" id="sw-hoof"></div></div>
  </div>

  <button id="fly-btn">Let's Fly! 🚀</button>
</div>

<!-- GAME OVER -->
<div id="gameover">
  <div id="go-score" style="color:#c084fc;font-size:52px;font-weight:900;margin-bottom:4px;text-shadow:0 0 30px rgba(192,132,252,0.6);"></div>
  <div id="go-best"  style="color:rgba(255,255,255,0.5);font-size:14px;margin-bottom:24px;"></div>
  <h1>Oh no!</h1>
  <p class="subtitle">Your unicorn bumped into something!</p>
  <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center;">
    <button class="go-btn" id="go-again">Fly Again</button>
    <button class="go-btn" style="background:linear-gradient(135deg,#6366f1,#8b5cf6);" id="go-reselect">Change Unicorn</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ═══════════════════════════════════════════════════════════
// COLOUR PALETTES
// ═══════════════════════════════════════════════════════════
var BODY_COLOURS = [
  {hex:'#e86dc8',val:0xe86dc8,name:'Rose Pink'},
  {hex:'#f97316',val:0xf97316,name:'Sunrise'},
  {hex:'#facc15',val:0xfacc15,name:'Lemon'},
  {hex:'#4ade80',val:0x4ade80,name:'Mint'},
  {hex:'#38bdf8',val:0x38bdf8,name:'Sky Blue'},
  {hex:'#a78bfa',val:0xa78bfa,name:'Lavender'},
  {hex:'#ffffff',val:0xffffff,name:'Snow'},
  {hex:'#f9a8d4',val:0xf9a8d4,name:'Baby Pink'},
];
var MANE_COLOURS = [
  {hex:'#4ecdc4',val:0x4ecdc4,name:'Teal'},
  {hex:'#c084fc',val:0xc084fc,name:'Purple'},
  {hex:'#f97316',val:0xf97316,name:'Orange'},
  {hex:'#facc15',val:0xfacc15,name:'Gold'},
  {hex:'#f9a8d4',val:0xf9a8d4,name:'Pink'},
  {hex:'#60a5fa',val:0x60a5fa,name:'Blue'},
  {hex:'#34d399',val:0x34d399,name:'Emerald'},
  {hex:'#ffffff',val:0xffffff,name:'White'},
];
var HORN_COLOURS = [
  {hex:'#f7d95a',val:0xf7d95a,name:'Gold'},
  {hex:'#ffffff',val:0xffffff,name:'Pearl'},
  {hex:'#c084fc',val:0xc084fc,name:'Purple'},
  {hex:'#f9a8d4',val:0xf9a8d4,name:'Rose'},
  {hex:'#60a5fa',val:0x60a5fa,name:'Ice'},
  {hex:'#4ecdc4',val:0x4ecdc4,name:'Teal'},
];
var HOOF_COLOURS = [
  {hex:'#8b7fd4',val:0x8b7fd4,name:'Indigo'},
  {hex:'#f7d95a',val:0xf7d95a,name:'Gold'},
  {hex:'#f9a8d4',val:0xf9a8d4,name:'Pink'},
  {hex:'#4ecdc4',val:0x4ecdc4,name:'Teal'},
  {hex:'#1a0a2e',val:0x1a0a2e,name:'Midnight'},
  {hex:'#ffffff',val:0xffffff,name:'White'},
];
var FAIRY_PRESETS = [
  {name:'Rose Fairy',   dress:'#f43f5e', hair:'#fde68a', skin:'#fcd9b6', wings:'#fda4af'},
  {name:'Ocean Fairy',  dress:'#0ea5e9', hair:'#a78bfa', skin:'#fcd9b6', wings:'#bae6fd'},
  {name:'Forest Fairy', dress:'#22c55e', hair:'#d97706', skin:'#c97b4b', wings:'#bbf7d0'},
  {name:'Star Fairy',   dress:'#a855f7', hair:'#fde68a', skin:'#fcd9b6', wings:'#e9d5ff'},
  {name:'Sun Fairy',    dress:'#f59e0b', hair:'#fecdd3', skin:'#fcd9b6', wings:'#fef9c3'},
  {name:'Twilight Fairy',dress:'#6366f1',hair:'#e879f9', skin:'#c97b4b', wings:'#c7d2fe'},
];

// ═══════════════════════════════════════════════════════════
// SELECTION STATE
// ═══════════════════════════════════════════════════════════
var sel = {
  fairy: 0,
  body:  0,
  mane:  0,
  horn:  0,
  hoof:  0,
};

// ── Draw a tiny SVG unicorn for the colour preview card ─────
function unicornSVG(body, mane, horn, hoof) {
  var b=body, m=mane, ho=horn, hv=hoof;
  return '<svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">'
    // body
    +'<ellipse cx="42" cy="50" rx="22" ry="14" fill="'+b+'"/>'
    // neck
    +'<polygon points="26,42 32,28 22,30" fill="'+b+'"/>'
    // head
    +'<ellipse cx="20" cy="26" rx="9" ry="7" fill="'+b+'"/>'
    // horn
    +'<polygon points="13,20 11,9 18,19" fill="'+ho+'"/>'
    // mane
    +'<ellipse cx="28" cy="28" rx="5" ry="8" fill="'+m+'"/>'
    +'<ellipse cx="34" cy="34" rx="4" ry="6" fill="'+m+'" opacity="0.8"/>'
    // eye
    +'<circle cx="16" cy="25" r="1.8" fill="#1a0a2e"/>'
    // legs
    +'<rect x="26" y="60" width="5" height="12" rx="2" fill="'+b+'"/>'
    +'<rect x="33" y="62" width="5" height="10" rx="2" fill="'+b+'"/>'
    +'<rect x="50" y="60" width="5" height="12" rx="2" fill="'+b+'"/>'
    +'<rect x="57" y="62" width="5" height="10" rx="2" fill="'+b+'"/>'
    // hooves
    +'<rect x="26" y="70" width="5" height="4" rx="1.5" fill="'+hv+'"/>'
    +'<rect x="33" y="70" width="5" height="4" rx="1.5" fill="'+hv+'"/>'
    +'<rect x="50" y="70" width="5" height="4" rx="1.5" fill="'+hv+'"/>'
    +'<rect x="57" y="70" width="5" height="4" rx="1.5" fill="'+hv+'"/>'
    // tail
    +'<path d="M64,46 Q76,38 72,56 Q68,62 62,58" fill="'+m+'"/>'
    +'</svg>';
}

// ── Draw a tiny SVG fairy for preset cards ──────────────────
function fairySVG(p) {
  return '<svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">'
    // wings
    +'<ellipse cx="28" cy="44" rx="16" ry="8" fill="'+p.wings+'" opacity="0.75" transform="rotate(-20,28,44)"/>'
    +'<ellipse cx="52" cy="44" rx="16" ry="8" fill="'+p.wings+'" opacity="0.75" transform="rotate(20,52,44)"/>'
    // dress
    +'<polygon points="40,40 28,68 52,68" fill="'+p.dress+'"/>'
    +'<ellipse cx="40" cy="42" rx="7" ry="4" fill="'+p.dress+'"/>'
    // body
    +'<ellipse cx="40" cy="37" rx="5" ry="6" fill="'+p.skin+'"/>'
    // head
    +'<circle cx="40" cy="27" r="8" fill="'+p.skin+'"/>'
    // hair
    +'<ellipse cx="40" cy="22" rx="9" ry="5" fill="'+p.hair+'"/>'
    +'<ellipse cx="33" cy="28" rx="4" ry="7" fill="'+p.hair+'"/>'
    +'<ellipse cx="47" cy="28" rx="4" ry="7" fill="'+p.hair+'"/>'
    // eyes
    +'<circle cx="37" cy="27" r="1.5" fill="#1a0a2e"/>'
    +'<circle cx="43" cy="27" r="1.5" fill="#1a0a2e"/>'
    // crown
    +'<polygon points="33,19 36,14 40,18 44,14 47,19" fill="'+p.dress+'" stroke="'+p.hair+'" stroke-width="0.5"/>'
    +'</svg>';
}

// ── Build character select UI ────────────────────────────────
function buildCharSelect() {
  // Fairy cards
  var fairyGrid = document.getElementById('fairy-grid');
  FAIRY_PRESETS.forEach(function(p, i) {
    var card = document.createElement('div');
    card.className = 'card' + (i===0?' selected':'');
    card.innerHTML = fairySVG(p) + '<span class="card-label">'+p.name+'</span>';
    card.addEventListener('click', function() {
      sel.fairy = i;
      fairyGrid.querySelectorAll('.card').forEach(function(c){ c.classList.remove('selected'); });
      card.classList.add('selected');
    });
    fairyGrid.appendChild(card);
  });

  // Colour swatches helper
  function makeSwatches(containerId, palette, key, onChange) {
    var container = document.getElementById(containerId);
    palette.forEach(function(c, i) {
      var sw = document.createElement('div');
      sw.className = 'colour-swatch' + (i===0?' selected':'');
      sw.style.background = c.hex;
      sw.title = c.name;
      sw.addEventListener('click', function() {
        sel[key] = i;
        container.querySelectorAll('.colour-swatch').forEach(function(s){ s.classList.remove('selected'); });
        sw.classList.add('selected');
        if (onChange) onChange();
      });
      container.appendChild(sw);
    });
  }

  makeSwatches('sw-body', BODY_COLOURS, 'body');
  makeSwatches('sw-mane', MANE_COLOURS, 'mane');
  makeSwatches('sw-horn', HORN_COLOURS, 'horn');
  makeSwatches('sw-hoof', HOOF_COLOURS, 'hoof');
}

buildCharSelect();

document.getElementById('fly-btn').addEventListener('click', function() {
  document.getElementById('charselect').style.display = 'none';
  document.getElementById('ui').style.display = 'block';
  initScene();
  running = true;
  document.getElementById('drag-hint').style.opacity = '1';
  setTimeout(function(){ document.getElementById('drag-hint').style.opacity='0'; }, 3500);
});

document.getElementById('go-again').addEventListener('click', function() {
  document.getElementById('gameover').style.display = 'none';
  document.getElementById('ui').style.display = 'block';
  initScene();
  running = true;
});
document.getElementById('go-reselect').addEventListener('click', function() {
  document.getElementById('gameover').style.display = 'none';
  document.getElementById('charselect').style.display = 'flex';
  document.getElementById('ui').style.display = 'none';
});

// ═══════════════════════════════════════════════════════════
// THREE.JS SETUP
// ═══════════════════════════════════════════════════════════
var canvas3d = document.getElementById('c');
var slCanvas = document.getElementById('sl');
var slCtx = slCanvas.getContext('2d');
var flashEl = document.getElementById('flash');

var renderer = new THREE.WebGLRenderer({ canvas: canvas3d, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

var scene = new THREE.Scene();
scene.background = new THREE.Color(0x7ec8f5);
scene.fog = new THREE.FogExp2(0xaaddf5, 0.004);

var camera = new THREE.PerspectiveCamera(65, 1, 0.1, 600);

var W, H;
function resize() {
  W = window.innerWidth; H = window.innerHeight;
  renderer.setSize(W, H);
  camera.aspect = W / H;
  camera.updateProjectionMatrix();
  slCanvas.width = W; slCanvas.height = H;
}
resize();
window.addEventListener('resize', resize);

// Lighting
scene.add(new THREE.AmbientLight(0xfff0ee, 0.8));
scene.add(new THREE.HemisphereLight(0x9dd8ff, 0x558833, 0.6));
var sun = new THREE.DirectionalLight(0xfff5d0, 1.8);
sun.position.set(60, 100, -30);
sun.castShadow = true;
sun.shadow.mapSize.width = 2048; sun.shadow.mapSize.height = 2048;
sun.shadow.camera.near = 1; sun.shadow.camera.far = 400;
sun.shadow.camera.left = sun.shadow.camera.bottom = -90;
sun.shadow.camera.right = sun.shadow.camera.top = 90;
sun.shadow.bias = -0.001; sun.shadow.radius = 3;
scene.add(sun);
var rimLight = new THREE.DirectionalLight(0xffccff, 0.4);
rimLight.position.set(-30, 15, 50);
scene.add(rimLight);

var C_EYE = 0x1a0a2e;

function smat(color, r, m) {
  return new THREE.MeshStandardMaterial({ color: color, roughness: r||0.75, metalness: m||0.04 });
}
function flatMat(color) {
  return new THREE.MeshLambertMaterial({ color: color, flatShading: true });
}
function jBox(w, h, d, j) {
  var geo = new THREE.BoxGeometry(w, h, d, 2, 2, 2).toNonIndexed();
  var pos = geo.attributes.position;
  for (var i = 0; i < pos.count; i++) {
    pos.setX(i, pos.getX(i) + (Math.random()-0.5)*j);
    pos.setY(i, pos.getY(i) + (Math.random()-0.5)*j);
    pos.setZ(i, pos.getZ(i) + (Math.random()-0.5)*j);
  }
  geo.computeVertexNormals();
  return geo;
}

// ═══════════════════════════════════════════════════════════
// BUILD UNICORN (colour-parameterised)
// ═══════════════════════════════════════════════════════════
var unicornGroup = null;

function buildUnicorn(colours) {
  var CB = colours.body, CM = colours.mane, CH = colours.horn, CV = colours.hoof;
  var g = new THREE.Group();

  var body = new THREE.Mesh(jBox(2.8,1.55,1.75,0.18), flatMat(CB));
  body.castShadow = true; body.receiveShadow = true; g.add(body);

  var rump = new THREE.Mesh(jBox(1.1,0.65,1.6,0.14), flatMat(CB));
  rump.position.set(0.85,0.52,0); rump.castShadow = true; g.add(rump);

  var chest = new THREE.Mesh(jBox(0.85,0.58,1.4,0.12), flatMat(CB));
  chest.position.set(-0.88,0.32,0); chest.castShadow = true; g.add(chest);

  var neck = new THREE.Mesh(jBox(0.72,1.75,0.62,0.10), flatMat(CB));
  neck.position.set(-1.12,1.12,0); neck.rotation.z=0.52; neck.castShadow=true; g.add(neck);

  var junc = new THREE.Mesh(jBox(0.88,0.68,0.88,0.10), flatMat(CB));
  junc.position.set(-0.72,0.52,0); junc.rotation.z=0.22; g.add(junc);

  var head = new THREE.Mesh(jBox(1.02,0.70,0.62,0.07), flatMat(CB));
  head.position.set(-2.28,1.88,0); head.rotation.z=0.18; head.castShadow=true; g.add(head);

  var snout = new THREE.Mesh(jBox(0.70,0.45,0.50,0.05), flatMat(CB));
  snout.position.set(-2.78,1.60,0); snout.rotation.z=0.10; g.add(snout);

  [-1,1].forEach(function(s) {
    var ear = new THREE.Mesh(new THREE.ConeGeometry(0.15,0.34,3), flatMat(CB));
    ear.position.set(-2.15,2.40,s*0.24); ear.rotation.x=s*0.14; ear.rotation.z=s*0.16-0.04; g.add(ear);
  });

  [-1,1].forEach(function(s) {
    var eye = new THREE.Mesh(new THREE.SphereGeometry(0.09,5,4), flatMat(C_EYE));
    eye.position.set(-2.22,1.94,s*0.30); g.add(eye);
  });

  var horn = new THREE.Mesh(new THREE.ConeGeometry(0.13,0.78,4), flatMat(CH));
  horn.position.set(-2.52,2.60,0); horn.rotation.z=0.36; horn.castShadow=true; g.add(horn);
  var hornLight = new THREE.PointLight(0xfde047,1.2,5);
  hornLight.position.set(-2.70,2.86,0);
  g.userData.hornLight = hornLight; g.add(hornLight);

  [{p:[-1.62,2.20,0],s:[0.50,0.76,0.48],r:-0.27},
   {p:[-1.15,2.28,0],s:[0.48,0.86,0.46],r:-0.13},
   {p:[-0.68,2.12,0],s:[0.44,0.72,0.42],r: 0.00},
   {p:[-0.22,1.92,0],s:[0.40,0.62,0.38],r: 0.13},
   {p:[ 0.18,1.70,0],s:[0.36,0.52,0.34],r: 0.24},
  ].forEach(function(seg,si) {
    var mm = new THREE.Mesh(jBox(1,1,1,0.11), flatMat(CM));
    mm.position.set(seg.p[0],seg.p[1],seg.p[2]);
    mm.scale.set(seg.s[0],seg.s[1],seg.s[2]);
    mm.rotation.z=seg.r; mm.castShadow=true;
    mm.userData.mT=si/4; mm.userData.mBase=mm.position.clone();
    g.add(mm);
  });

  function makeLeg(x,z,raise) {
    var lg = new THREE.Group();
    var upper = new THREE.Mesh(jBox(0.35,0.92,0.30,0.05), flatMat(CB));
    upper.position.y=-0.46; upper.castShadow=true; upper.receiveShadow=true; lg.add(upper);
    var knee = new THREE.Mesh(jBox(0.32,0.22,0.28,0.04), flatMat(CB));
    knee.position.y=-0.98; lg.add(knee);
    var lower = new THREE.Mesh(jBox(0.27,0.82,0.25,0.04), flatMat(CB));
    lower.position.y=-1.42; lower.castShadow=true; lower.receiveShadow=true; lg.add(lower);
    var hoof = new THREE.Mesh(jBox(0.33,0.24,0.28,0.03), flatMat(CV));
    hoof.position.y=-1.90; hoof.castShadow=true; lg.add(hoof);
    lg.position.set(x,-0.62,z);
    if (raise) { lg.rotation.z=0.50; lg.rotation.x=-0.26; }
    return lg;
  }
  g.add(makeLeg(-1.02,-0.52,true));
  var fr=makeLeg(-1.02,0.52,false); fr.rotation.x=0.11; g.add(fr);
  g.add(makeLeg(0.88,-0.52,false));
  var br=makeLeg(0.88,0.52,false); br.rotation.x=-0.08; g.add(br);

  [{p:[1.42,0.28,0],s:[0.46,0.66,0.44],r:0.20},
   {p:[1.62,-0.16,0],s:[0.42,0.60,0.40],r:0.46},
   {p:[1.72,-0.62,0.10],s:[0.36,0.56,0.34],r:0.66},
   {p:[1.70,-1.02,0],s:[0.30,0.50,0.28],r:0.82},
   {p:[1.56,-1.38,0],s:[0.24,0.44,0.24],r:0.98},
  ].forEach(function(seg,si) {

    tm.position.set(seg.p[0],seg.p[1],seg.p[2]);

// BUILD FAIRY (floats above unicorn)
// ═══════════════════════════════════════════════════════════
var fairyGroup = null;

function buildFairy(preset) {
  var CD = parseInt(preset.dress.replace('#',''),16);
  var CH = parseInt(preset.hair.replace('#',''),16);
  var CS = parseInt(preset.skin.replace('#',''),16);
  var CW = parseInt(preset.wings.replace('#',''),16);

  var g = new THREE.Group();

  // Wings — two flat triangular shapes either side
  [-1,1].forEach(function(s) {
    var wShape = new THREE.Shape();
    wShape.moveTo(0,0);
    wShape.bezierCurveTo(s*1.8,0.6, s*2.2,2.0, s*0.8,2.4);
    wShape.bezierCurveTo(s*0.2,2.0, s*0.0,1.0, 0,0);
    var wGeo = new THREE.ShapeGeometry(wShape,8);
    var wMat = new THREE.MeshLambertMaterial({
      color: CW, side: THREE.DoubleSide,
      transparent: true, opacity: 0.72, flatShading: true
    });
    var wing = new THREE.Mesh(wGeo, wMat);
    wing.position.set(s*0.22, 0.5, 0);
    wing.rotation.y = s*0.25;
    wing.castShadow = false;
    wing.userData.wing = true;
    wing.userData.side = s;
    g.add(wing);
  });

  // Dress (cone)
  var dress = new THREE.Mesh(
    new THREE.ConeGeometry(0.55, 1.2, 6),
    flatMat(CD)
  );
  dress.position.y = -0.2;
  dress.castShadow = true;
  g.add(dress);

  // Bodice
  var bodice = new THREE.Mesh(jBox(0.38,0.45,0.32,0.04), flatMat(CD));
  bodice.position.y = 0.65;
  g.add(bodice);

  // Head
  var headMesh = new THREE.Mesh(new THREE.SphereGeometry(0.32,10,8), flatMat(CS));
  headMesh.position.y = 1.22;
  headMesh.castShadow = true;
  g.add(headMesh);

  // Hair — blob on top + sides
  var hairTop = new THREE.Mesh(jBox(0.52,0.28,0.48,0.05), flatMat(CH));
  hairTop.position.set(0,1.50,0);
  g.add(hairTop);
  [-1,1].forEach(function(s) {
    var hairSide = new THREE.Mesh(jBox(0.18,0.42,0.35,0.04), flatMat(CH));
    hairSide.position.set(s*0.36,1.18,0);
    g.add(hairSide);
  });

  // Crown
  var crownMat = flatMat(CD);
  for (var pi=0; pi<5; pi++) {
    var ang = (pi/5)*Math.PI*2;
    var spike = new THREE.Mesh(new THREE.ConeGeometry(0.06,0.18,3), crownMat);
    spike.position.set(Math.cos(ang)*0.25, 1.62, Math.sin(ang)*0.25);
    g.add(spike);
  }

  // Eyes
  [-1,1].forEach(function(s) {
    var eye = new THREE.Mesh(new THREE.SphereGeometry(0.055,5,4), flatMat(C_EYE));
    eye.position.set(s*0.12,1.24,0.28);
    g.add(eye);
  });

  // Wand
  var wandStick = new THREE.Mesh(
    new THREE.CylinderGeometry(0.025,0.025,0.9,5),
    flatMat(CH)
  );
  wandStick.position.set(0.55,0.55,0);
  wandStick.rotation.z = -0.4;
  g.add(wandStick);
  var wandStar = new THREE.Mesh(new THREE.OctahedronGeometry(0.12,0), flatMat(0xfde047));
  wandStar.position.set(0.90,0.92,0);
  wandStar.userData.wand = true;
  g.add(wandStar);

  // Fairy glow
  var fairyLight = new THREE.PointLight(0xffd4f5, 0.8, 4);
  fairyLight.position.set(0,1,0);
  g.userData.fairyLight = fairyLight;
  g.add(fairyLight);

  return g;
}

// ENVIRONMENT BUILDERS
// ═══════════════════════════════════════════════════════════
function buildCloud(sc) {
  sc=sc||1;
  var g=new THREE.Group();
  var m=smat(0xffffff,0.95,0);
  [[0,0,0,2.0],[-2.2,0,0,1.5],[2.2,0,0,1.5],[-1.1,1.3,0,1.2],[1.1,1.3,0,1.2],
   [0,1.7,0,1.0],[-3.1,-0.3,0,0.9],[3.1,-0.3,0,0.9],[0,0,1.3,1.2],[0,0,-1.1,1.1]
  ].forEach(function(d) {
    var mesh=new THREE.Mesh(new THREE.SphereGeometry(d[3]*sc,14,10),m);
    mesh.position.set(d[0]*sc,d[1]*sc,d[2]*sc);
    mesh.castShadow=true; mesh.receiveShadow=true; g.add(mesh);
  });
  return g;
}

function buildMountain() {
  var g=new THREE.Group();
  var h=24+Math.random()*20, r=8+Math.random()*7;
  var geo=new THREE.ConeGeometry(r,h,11+Math.floor(Math.random()*4),4).toNonIndexed();
  var pa=geo.attributes.position;
  for (var i=0;i<pa.count;i++) {
    if (pa.getY(i)<h*0.42) {
      pa.setX(i,pa.getX(i)+(Math.random()-0.5)*1.6);
      pa.setZ(i,pa.getZ(i)+(Math.random()-0.5)*1.6);
    }
  }
  geo.computeVertexNormals();
  var col=new THREE.Color(); col.setHSL(0.65+Math.random()*0.08,0.22,0.35+Math.random()*0.14);
  var rock=new THREE.Mesh(geo,smat(col,0.91)); rock.castShadow=true; rock.receiveShadow=true; g.add(rock);
  var snowH=h*(0.23+Math.random()*0.1);
  var snow=new THREE.Mesh(new THREE.ConeGeometry(r*0.30,snowH,11,2),smat(0xeef6ff,0.82));
  snow.position.y=h/2-snowH*0.28; snow.castShadow=true; g.add(snow);
  for (var ci=0;ci<4;ci++) {
    var ang=Math.random()*Math.PI*2, ht=Math.random()*h*0.4-h*0.18;
    var patch=new THREE.Mesh(new THREE.SphereGeometry(r*(0.1+Math.random()*0.17),7,5),smat(0x2d2555,0.93));
    patch.position.set(Math.cos(ang)*r*0.6,ht,Math.sin(ang)*r*0.6); g.add(patch);
  }
  g.userData.radius=r*0.70; g.userData.height=h;
  return g;
}

function buildTree() {
  var g=new THREE.Group();
  var h=7+Math.random()*5;
  var trunk=new THREE.Mesh(new THREE.CylinderGeometry(0.22,0.40,h*0.36,10),smat(0x6b3a1c,0.90));
  trunk.position.y=h*0.18; trunk.castShadow=true; trunk.receiveShadow=true; g.add(trunk);
  var layers=3+Math.floor(Math.random()*2);
  for (var i=0;i<layers;i++) {
    var t=i/(layers-1||1), lr=(0.84-t*0.46)*(1.9+Math.random()*0.55);
    var gc=new THREE.Color(); gc.setHSL(0.33,0.65,0.22+Math.random()*0.18);
    var layer=new THREE.Mesh(new THREE.ConeGeometry(lr,(1-t*0.33)*2.3,10,2),smat(gc,0.88));
    layer.position.y=h*0.28+i*(h*0.19); layer.castShadow=true; layer.receiveShadow=true; g.add(layer);
  }
  g.userData.radius=1.7;
  return g;
}

function buildStar() {
  var g=new THREE.Group();
  g.add(new THREE.Mesh(new THREE.OctahedronGeometry(0.5,1),
    new THREE.MeshStandardMaterial({color:0xfde047,roughness:0.12,metalness:0.8,emissive:0xfbbf24,emissiveIntensity:0.8})));
  g.add(new THREE.Mesh(new THREE.SphereGeometry(0.85,10,7),
    new THREE.MeshBasicMaterial({color:0xfde68a,transparent:true,opacity:0.14})));
  g.add(new THREE.PointLight(0xfde047,1.8,12));
  return g;
}

var groundTiles=[];
function buildGroundTile(z) {
  var geo=new THREE.PlaneGeometry(280,110,28,12).toNonIndexed();
  var p=geo.attributes.position;
  for (var i=0;i<p.count;i++) p.setZ(i,(Math.random()-0.5)*2.2);
  geo.computeVertexNormals();
  var col=new THREE.Color(); col.setHSL(0.33,0.44,0.33+Math.random()*0.08);
  var m=new THREE.Mesh(geo,smat(col,0.92));
  m.rotation.x=-Math.PI/2; m.position.set(0,-22,z); m.receiveShadow=true;
  scene.add(m); groundTiles.push(m);
}

// ═══════════════════════════════════════════════════════════
// GAME STATE
// ═══════════════════════════════════════════════════════════
var obstacles=[],clouds=[],stars=[];
var lives=3,score=0,best=0,speed=0.22,running=false;
var targetX=0,targetY=0,camX=0,camY=0;
var velX=0,velY=0;
var wingTime=0,maneTime=0,invincible=0;
var dragActive=false,lastTX=0,lastTY=0;
var spawnT=0,cloudT=0,starT=0;

camera.position.set(0,8,14);

function initScene() {
  obstacles.concat(clouds).concat(stars).forEach(function(o){if(o)scene.remove(o);});
  groundTiles.forEach(function(t){scene.remove(t);});
  obstacles=[];clouds=[];stars=[];groundTiles.length=0;

  for (var i=0;i<5;i++) buildGroundTile(-i*100+50);

  // Build unicorn with selected colours
  if (unicornGroup) scene.remove(unicornGroup);
  unicornGroup = buildUnicorn({
    body: BODY_COLOURS[sel.body].val,
    mane: MANE_COLOURS[sel.mane].val,
    horn: HORN_COLOURS[sel.horn].val,
    hoof: HOOF_COLOURS[sel.hoof].val,
  });
  unicornGroup.position.set(0,2,0);
  scene.add(unicornGroup);

  // Build fairy with selected preset
  if (fairyGroup) scene.remove(fairyGroup);
  fairyGroup = buildFairy(FAIRY_PRESETS[sel.fairy]);
  scene.add(fairyGroup);

  for (var i=0;i<10;i++) spawnCloud(true);

  targetX=0;targetY=0;camX=0;camY=0;velX=0;velY=0;
  speed=0.22;score=0;lives=3;invincible=0;
  spawnT=0;cloudT=0;starT=0;
  updateHearts();
}

function spawnObstacle() {
  var isMtn=Math.random()<0.55;
  var obj=isMtn?buildMountain():buildTree();
  var x=(Math.random()-0.5)*65;
  obj.position.set(x,isMtn?-22+(obj.userData.height||20)/2:-22,-280);
  obj.userData.obstacle=true; obj.userData.isMtn=isMtn;
  scene.add(obj); obstacles.push(obj);
}
function spawnCloud(init) {
  var c=buildCloud(0.85+Math.random()*0.75);
  c.position.set((Math.random()-0.5)*130,5+Math.random()*22,init?-(Math.random()*280+10):-300);
  c.userData.spd=0.12+Math.random()*0.22;
  scene.add(c); clouds.push(c);
}
function spawnStar() {
  var s=buildStar();
  s.position.set((Math.random()-0.5)*44,6+Math.random()*10,-220);
  scene.add(s); stars.push(s);
}

function updateHearts() {
  ['h1','h2','h3'].forEach(function(id,i){document.getElementById(id).classList.toggle('lost',i>=lives);});
}
function flashHit() {
  flashEl.style.opacity='1';
  setTimeout(function(){flashEl.style.opacity='0';},200);
}
function hit() {
  if (invincible>0) return;
  lives--; updateHearts(); flashHit();
  invincible=110;
  if (lives<=0) endGame();
}

function drawSpeedLines(alpha) {
  slCtx.clearRect(0,0,W,H);
  if (alpha<0.04) return;
  var cx=W/2,cy=H/2; slCtx.lineWidth=1.0;
  for (var i=0;i<65;i++) {
    var ang=(i/65)*Math.PI*2;
    var inner=85+Math.random()*65,outer=inner+65+Math.random()*130;
    slCtx.strokeStyle='rgba(255,255,255,'+(alpha*0.45)+')';
    slCtx.beginPath();
    slCtx.moveTo(cx+Math.cos(ang)*inner,cy+Math.sin(ang)*inner);
    slCtx.lineTo(cx+Math.cos(ang)*outer,cy+Math.sin(ang)*outer);
    slCtx.stroke();
  }
}

function endGame() {
  running=false;
  var isNew=score>best;
  if (isNew) best=score;
  document.getElementById('best').textContent='Best: '+best+'m';
  document.getElementById('ui').style.display='none';
  document.getElementById('go-score').textContent=score+'m';
  document.getElementById('go-best').textContent=isNew?'🏆 New personal best!':'Best: '+best+'m';
  document.getElementById('gameover').style.display='flex';
}

// INPUT
// ═══════════════════════════════════════════════════════════
var BOUNDS={x:25,yMin:-2,yMax:18};
var keys={};
window.addEventListener('keydown',function(e){
  keys[e.key]=true;
  if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].indexOf(e.key)>-1) e.preventDefault();
});
window.addEventListener('keyup',function(e){keys[e.key]=false;});

function applyKeyboard() {
  if (!running) return;
  var spd=0.30;
  if (keys['ArrowLeft'])  targetX=Math.max(-BOUNDS.x,targetX-spd);
  if (keys['ArrowRight']) targetX=Math.min(BOUNDS.x,targetX+spd);
  if (keys['ArrowUp'])    targetY=Math.min(BOUNDS.yMax,targetY+spd*0.55);
  if (keys['ArrowDown'])  targetY=Math.max(BOUNDS.yMin,targetY-spd*0.55);
}
function onMove(cx,cy) {
  if (!running||!dragActive) return;
  var dx=cx-lastTX,dy=cy-lastTY;
  targetX=Math.max(-BOUNDS.x,Math.min(BOUNDS.x,targetX+dx*0.030));
  targetY=Math.max(BOUNDS.yMin,Math.min(BOUNDS.yMax,targetY-dy*0.030));
  lastTX=cx; lastTY=cy;
}
canvas3d.addEventListener('mousedown',function(e){dragActive=true;lastTX=e.clientX;lastTY=e.clientY;});
canvas3d.addEventListener('mousemove',function(e){onMove(e.clientX,e.clientY);});
window.addEventListener('mouseup',function(){dragActive=false;});
canvas3d.addEventListener('touchstart',function(e){e.preventDefault();dragActive=true;lastTX=e.touches[0].clientX;lastTY=e.touches[0].clientY;},{passive:false});
canvas3d.addEventListener('touchmove',function(e){e.preventDefault();onMove(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
window.addEventListener('touchend',function(){dragActive=false;});

// ═══════════════════════════════════════════════════════════
// LOOP
// ═══════════════════════════════════════════════════════════
var clock=new THREE.Clock();

function loop() {
  requestAnimationFrame(loop);
  var dt=Math.min(clock.getDelta(),0.05);

  if (running) {
    applyKeyboard();
    score=Math.floor(score+speed*3);
    speed=Math.min(0.68,0.22+score*0.0001);
    document.getElementById('score').textContent=score+'m';

    var prevX=camX,prevY=camY;
    camX+=(targetX-camX)*0.055;
    camY+=(targetY-camY)*0.055;
    var dX=camX-prevX,dY=camY-prevY;
    velX+=(dX-velX)*0.18;
    velY+=(dY-velY)*0.18;

    if (unicornGroup) {
      unicornGroup.position.x=camX;
      unicornGroup.position.y=2+camY;

      var tYaw=-velX*0.55, tPitch=velY*0.45, tRoll=velX*0.35;
      unicornGroup.rotation.y+=(tYaw-unicornGroup.rotation.y)*0.12;
      unicornGroup.rotation.x+=(tPitch-unicornGroup.rotation.x)*0.12;
      unicornGroup.rotation.z+=(tRoll-unicornGroup.rotation.z)*0.12;

      wingTime+=dt*4.5; maneTime+=dt*2.0;

      for (var ci=0;ci<unicornGroup.children.length;ci++) {
        var child=unicornGroup.children[ci];
        if (child.userData.mT!==undefined) {
          var b=child.userData.mBase,mt=child.userData.mT;
          child.position.y=b.y+Math.sin(maneTime*1.1+mt*5.0)*0.10;
          child.position.x=b.x+Math.sin(maneTime*0.7+mt*2.5)*0.05;
        }
        if (child.userData.tailT!==undefined) {
          var b=child.userData.tailBase,tt=child.userData.tailT;
          child.position.x=b.x+Math.sin(maneTime*0.9+tt*4.0)*0.18;
          child.position.y=b.y+Math.sin(maneTime*1.2+tt*3.5)*0.10;
        }
      }
      if (unicornGroup.userData.hornLight) {
        unicornGroup.userData.hornLight.intensity=1.2+Math.sin(maneTime*3)*0.3;
      }

      if (invincible>0) {
        invincible--;
        unicornGroup.visible=(Math.floor(invincible/7)%2)===0;
        if (fairyGroup) fairyGroup.visible=unicornGroup.visible;
      } else {
        unicornGroup.visible=true;
        if (fairyGroup) fairyGroup.visible=true;
      }
    }

    // Fairy floats above unicorn, bobs gently
    if (fairyGroup && unicornGroup) {
      var uYawF=unicornGroup.rotation.y;
      var floatY=unicornGroup.position.y+3.8+Math.sin(maneTime*1.4)*0.22;
      fairyGroup.position.x=unicornGroup.position.x-Math.sin(uYawF)*0.3;
      fairyGroup.position.y=floatY;
      fairyGroup.position.z=unicornGroup.position.z-Math.cos(uYawF)*0.3;
      // Fairy faces same direction as unicorn, slight extra bob rotation
      fairyGroup.rotation.y=unicornGroup.rotation.y;
      fairyGroup.rotation.z=Math.sin(maneTime*0.9)*0.08;
      // Animate wings
      for (var fi=0;fi<fairyGroup.children.length;fi++) {
        var fc=fairyGroup.children[fi];
        if (fc.userData.wing) {
          fc.rotation.y=fc.userData.side*(0.25+Math.sin(wingTime*1.8)*0.35);
          fc.rotation.z=fc.userData.side*Math.sin(wingTime*2.2)*0.15;
        }
        if (fc.userData.wand) {
          fc.rotation.z=Math.sin(maneTime*2.5)*0.3;
        }
      }
      if (fairyGroup.userData.fairyLight) {
        fairyGroup.userData.fairyLight.intensity=0.8+Math.sin(maneTime*4)*0.3;
      }
    }

    // Camera
    var uPos=unicornGroup?unicornGroup.position:new THREE.Vector3();
    var uYaw=unicornGroup?unicornGroup.rotation.y:0;
    var camOffX=Math.sin(uYaw)*12, camOffZ=Math.cos(uYaw)*12;
    camera.position.x+=(uPos.x+camOffX-camera.position.x)*0.08;
    camera.position.y+=(uPos.y+5.0-camera.position.y)*0.08;
    camera.position.z+=(uPos.z+camOffZ-camera.position.z)*0.08;
    camera.lookAt(uPos.x-Math.sin(uYaw)*3, uPos.y+0.8, uPos.z-Math.cos(uYaw)*3);

    spawnT++; if(spawnT>Math.max(30,76-score*0.034)){spawnObstacle();spawnT=0;}
    cloudT++; if(cloudT>40){spawnCloud(false);cloudT=0;}
    starT++;  if(starT>100){spawnStar();starT=0;}

    var fwd=speed*90*dt;

    for (var i=obstacles.length-1;i>=0;i--) {
      var o=obstacles[i];
      if(!o){obstacles.splice(i,1);continue;}
      o.position.z+=fwd;
      if(o.position.z>18){scene.remove(o);obstacles.splice(i,1);continue;}
      if(invincible<=0&&unicornGroup){
        var dx=unicornGroup.position.x-o.position.x;
        var dy=unicornGroup.position.y-(o.userData.isMtn?o.position.y+(o.userData.height||20)*0.55:o.position.y+5);
        if(Math.sqrt(dx*dx+dy*dy)<(o.userData.radius||2.2)&&o.position.z>-10&&o.position.z<6) hit();
      }
    }
    for (var i=clouds.length-1;i>=0;i--) {
      var c=clouds[i];
      if(!c){clouds.splice(i,1);continue;}
      c.position.z+=fwd*0.28+c.userData.spd;
      if(c.position.z>38){scene.remove(c);clouds.splice(i,1);}
    }
    for (var i=stars.length-1;i>=0;i--) {
      var s=stars[i];
      if(!s){stars.splice(i,1);continue;}
      s.position.z+=fwd; s.rotation.y+=dt*2.8;
      if(s.position.z>18){scene.remove(s);stars.splice(i,1);continue;}
      if(unicornGroup){
        var dx=unicornGroup.position.x-s.position.x;
        var dy=unicornGroup.position.y-s.position.y;
        if(Math.sqrt(dx*dx+dy*dy)<3.5&&s.position.z>-8){score+=75;scene.remove(s);stars.splice(i,1);}
      }
    }
    for (var i=0;i<groundTiles.length;i++) {
      groundTiles[i].position.z+=fwd;
      if(groundTiles[i].position.z>60) groundTiles[i].position.z-=500;
    }
    if(unicornGroup) sun.position.set(unicornGroup.position.x+60,unicornGroup.position.y+100,unicornGroup.position.z-30);
    drawSpeedLines(Math.max(0,(speed-0.42)/0.26));
  }

  renderer.render(scene,camera);
}

loop();
</script>
